<!DOCTYPE html>
<html lang="en">
<head>
<meta name="x-ogp-key" content="d3623dc6-3cfc-49fa-b771-3bbb8d52e4a1" id="ogp-key-meta" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Capy Cafe Truck Rally</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@500;700&family=JetBrains+Mono:wght@700&family=Quicksand:wght@300;400;500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #131313; touch-action: none; font-family: 'Quicksand', sans-serif; }
        canvas { position: fixed; inset: 0; z-index: 0; display: block; width: 100vw; height: 100vh; }
        #loading {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #1a3a1a; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            font-family: 'Quicksand', sans-serif; color: #a8d5a2;
            transition: opacity 0.6s ease;
        }
        #loading.fade-out { opacity: 0; pointer-events: none; }
        #loading .title { font-size: 28px; margin-bottom: 20px; letter-spacing: 2px; font-weight: 300; }
        #loading .bar { width: 200px; height: 6px; background: #0a1a0a; border-radius: 3px; overflow: hidden; }
        #loading .fill { height: 100%; background: #6abf69; width: 0%; transition: width 0.3s; }
        #loading .sub { font-size: 12px; margin-top: 10px; opacity: 0.6; }

        #main-menu {
            --garage-bg: rgba(14, 14, 14, 0.86);
            --garage-stroke: rgba(255, 255, 255, 0.12);
            --garage-text: #f1e8df;
            --garage-muted: #d5bca5;
            --garage-orange: #ff8c00;
            --garage-orange-soft: #ffb77d;
            --garage-green: #00e639;
            position: fixed;
            inset: 0;
            z-index: 70;
            display: none;
            pointer-events: none;
            font-family: 'Archivo Narrow', 'Quicksand', sans-serif;
            color: var(--garage-text);
            overflow: hidden;
            isolation: isolate;
        }
        #main-menu.visible { display: block; }
        #main-menu::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(90deg, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.48) 34%, rgba(0,0,0,0.02) 62%),
                radial-gradient(circle at 74% 42%, rgba(255, 140, 0, 0.20), transparent 28%),
                radial-gradient(circle at 88% 75%, rgba(0, 230, 57, 0.12), transparent 24%);
            pointer-events: none;
            z-index: -3;
        }
        #main-menu::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0) 0,
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.10) 50%,
                rgba(0,0,0,0.10) 100%
            );
            background-size: 100% 4px;
            opacity: 0.46;
            pointer-events: none;
            z-index: 2;
        }
        .menu-noise {
            position: absolute;
            inset: 0;
            z-index: -2;
            pointer-events: none;
            opacity: 0.28;
            background-image:
                radial-gradient(circle at 12% 24%, rgba(255,255,255,0.26) 0 1px, transparent 1.5px),
                radial-gradient(circle at 72% 18%, rgba(255,140,0,0.36) 0 1px, transparent 1.5px),
                radial-gradient(circle at 58% 72%, rgba(0,230,57,0.22) 0 1px, transparent 1.5px);
            background-size: 78px 78px, 118px 118px, 96px 96px;
            animation: menu-dust 12s linear infinite;
        }
        @keyframes menu-dust {
            from { transform: translate3d(0, 0, 0); }
            to { transform: translate3d(0, -78px, 0); }
        }
        .menu-panel {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: clamp(300px, 26vw, 380px);
            padding: clamp(34px, 10vh, 96px) 24px 28px;
            pointer-events: all;
            background: var(--garage-bg);
            border-right: 1px solid var(--garage-stroke);
            box-shadow: 20px 0 70px rgba(0,0,0,0.52);
            backdrop-filter: blur(14px);
        }
        .menu-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            border-right: 3px solid rgba(255, 140, 0, 0.44);
            pointer-events: none;
        }
        .menu-kicker {
            font: 700 14px/1 'JetBrains Mono', monospace;
            color: var(--garage-muted);
            letter-spacing: 0.14em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .menu-title {
            font: 700 clamp(34px, 4vw, 54px)/0.92 'Space Mono', monospace;
            letter-spacing: 0;
            color: var(--garage-orange-soft);
            text-transform: uppercase;
            text-shadow:
                0 3px 0 #5a2600,
                0 16px 36px rgba(255, 140, 0, 0.28);
            margin-bottom: 8px;
        }
        .menu-status {
            font: 700 13px/1.2 'JetBrains Mono', monospace;
            letter-spacing: 0.1em;
            color: var(--garage-green);
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .menu-status::before {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--garage-green);
            box-shadow: 0 0 18px rgba(0,230,57,0.9);
            animation: status-pulse 1.4s ease-in-out infinite;
        }
        @keyframes status-pulse {
            0%, 100% { transform: scale(0.82); opacity: 0.72; }
            50% { transform: scale(1.2); opacity: 1; }
        }
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 18px;
        }
        .menu-btn {
            appearance: none;
            min-height: 66px;
            border-radius: 4px;
            border: 1px solid transparent;
            padding: 0 18px;
            color: var(--garage-text);
            background: rgba(255,255,255,0.045);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 18px;
            text-align: left;
            font: 700 21px/1 'JetBrains Mono', monospace;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
        }
        .menu-btn svg {
            width: 28px;
            height: 28px;
            flex: 0 0 28px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.1;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .menu-btn.primary {
            color: #2f1500;
            background: linear-gradient(180deg, rgba(255, 183, 125, 0.98), rgba(255, 140, 0, 0.92));
            border-color: rgba(255, 220, 195, 0.6);
            box-shadow: 0 0 24px rgba(255, 140, 0, 0.30), inset 0 1px 0 rgba(255,255,255,0.42);
        }
        .menu-btn:hover {
            transform: translateX(7px) scale(1.02);
            background: rgba(255,255,255,0.10);
            border-color: rgba(255, 183, 125, 0.38);
            box-shadow: 0 0 18px rgba(255, 140, 0, 0.18);
        }
        .menu-btn.primary:hover {
            background: linear-gradient(180deg, #ffd4ae, #ff8c00);
            box-shadow: 0 0 28px rgba(255, 140, 0, 0.48), inset 0 1px 0 rgba(255,255,255,0.48);
        }
        .menu-btn:active { transform: translateX(3px) scale(0.98); }
        .settings-panel {
            display: none;
            margin-top: 16px;
            padding: 14px;
            background: rgba(28, 27, 27, 0.82);
            border: 1px solid rgba(255, 183, 125, 0.22);
            border-radius: 4px;
            box-shadow: 0 18px 36px rgba(0,0,0,0.28);
        }
        .settings-panel.visible { display: block; }
        .settings-row {
            width: 100%;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border: 0;
            background: transparent;
            color: var(--garage-muted);
            font: 700 15px/1 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            cursor: pointer;
            padding: 0;
        }
        .settings-toggle {
            width: 46px;
            height: 24px;
            border-radius: 99px;
            background: #353535;
            border: 1px solid rgba(255,255,255,0.18);
            position: relative;
            flex: 0 0 auto;
        }
        .settings-toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #e5e2e1;
            transition: transform 0.18s ease, background 0.18s ease;
        }
        .settings-row.active .settings-toggle {
            background: rgba(0, 230, 57, 0.28);
            border-color: rgba(0, 230, 57, 0.65);
        }
        .settings-row.active .settings-toggle::after {
            transform: translateX(22px);
            background: var(--garage-green);
        }
        .exit-note {
            display: none;
            margin-top: 12px;
            padding: 11px 12px;
            border-radius: 4px;
            background: rgba(147, 0, 10, 0.22);
            border: 1px solid rgba(255, 180, 171, 0.24);
            color: #ffdad6;
            font: 700 13px/1.35 'JetBrains Mono', monospace;
            letter-spacing: 0.03em;
        }
        .exit-note.visible { display: block; }
        .menu-logo-wrap {
            position: absolute;
            top: clamp(18px, 4vh, 34px);
            left: clamp(330px, 31vw, 440px);
            z-index: 1;
            width: min(300px, 28vw);
            pointer-events: none;
        }
        .menu-logo {
            display: block;
            width: 100%;
            object-fit: contain;
            filter: drop-shadow(0 16px 24px rgba(0,0,0,0.72)) brightness(1.08);
            animation: logo-glitch 4.5s linear infinite;
        }
        @keyframes logo-glitch {
            0%, 92%, 100% { filter: drop-shadow(0 16px 24px rgba(0,0,0,0.72)) brightness(1.08) contrast(1); transform: translate3d(0,0,0); }
            94% { filter: drop-shadow(0 16px 24px rgba(0,0,0,0.72)) brightness(1.45) hue-rotate(25deg); transform: translate3d(2px,-1px,0); }
            96% { filter: drop-shadow(0 16px 24px rgba(0,0,0,0.72)) brightness(0.9) hue-rotate(-20deg); transform: translate3d(-2px,1px,0); }
        }
        .menu-chip {
            position: absolute;
            z-index: 1;
            pointer-events: all;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-height: 42px;
            padding: 9px 14px;
            border-radius: 4px;
            background: rgba(14, 14, 14, 0.78);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 14px 32px rgba(0,0,0,0.36);
            backdrop-filter: blur(10px);
            font: 700 14px/1 'JetBrains Mono', monospace;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .menu-chip.engine {
            top: clamp(18px, 4vh, 34px);
            right: clamp(18px, 4vw, 48px);
            color: var(--garage-green);
        }
        .menu-chip.engine::before {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--garage-green);
            box-shadow: 0 0 14px rgba(0,230,57,0.8);
        }
        .menu-chip.class {
            left: clamp(340px, 32vw, 460px);
            bottom: clamp(42px, 10vh, 88px);
            color: var(--garage-orange-soft);
            border: 2px solid rgba(255, 183, 125, 0.28);
            transform: rotate(-5deg);
            font-size: 22px;
        }
        @media (prefers-reduced-motion: reduce) {
            .menu-noise,
            .menu-status::before,
            .menu-logo {
                animation: none !important;
            }
        }
        @media (max-width: 760px) {
            #main-menu::before {
                background:
                    linear-gradient(0deg, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.28) 58%, rgba(0,0,0,0.72) 100%),
                    radial-gradient(circle at 72% 32%, rgba(255, 140, 0, 0.20), transparent 34%);
            }
            .menu-panel {
                top: auto;
                right: 0;
                width: auto;
                min-height: 315px;
                padding: 20px 18px calc(20px + env(safe-area-inset-bottom, 0px));
                border-right: 0;
                border-top: 1px solid var(--garage-stroke);
            }
            .menu-panel::before {
                border-right: 0;
                border-top: 3px solid rgba(255, 140, 0, 0.44);
            }
            .menu-title {
                font-size: clamp(30px, 9vw, 44px);
                max-width: 320px;
            }
            .menu-status { margin-bottom: 18px; }
            .menu-buttons {
                display: grid;
                grid-template-columns: 1fr;
                gap: 8px;
            }
            .menu-btn {
                min-height: 54px;
                font-size: 17px;
            }
            .menu-btn svg {
                width: 23px;
                height: 23px;
                flex-basis: 23px;
            }
            .menu-logo-wrap {
                top: calc(16px + env(safe-area-inset-top, 0px));
                left: 16px;
                width: 128px;
            }
            .menu-chip.engine {
                top: calc(18px + env(safe-area-inset-top, 0px));
                right: 14px;
                font-size: 11px;
                min-height: 34px;
                padding: 7px 10px;
            }
            .menu-chip.class {
                display: none;
            }
        }

        #hud {
            position: fixed; top: 60px; left: 0; right: 0;
            pointer-events: none; z-index: 50;
            padding: 10px 16px;
            display: none; justify-content: space-between; align-items: flex-start;
        }
        @media (max-width: 600px) {
            #points { font-size: 12px; padding: 3px 10px; }
            #points span { font-size: 14px; }
            #music-controls { gap: 5px; }
            #music-controls button { width: 30px; height: 30px; }
            #music-controls button svg { width: 14px; height: 14px; }
        }
        #points {
            color: rgba(255,255,255,0.75);
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 5px 14px;
            backdrop-filter: blur(8px);
        }
        #points span { font-weight: 500; font-size: 17px; }
        #music-controls {
            pointer-events: all;
            display: flex; gap: 8px; align-items: center;
        }
        #music-controls button {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.7);
            border-radius: 50%;
            width: 36px; height: 36px;
            padding: 0;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }
        #music-controls button:hover {
            background: rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.9);
        }
        #music-controls button:active {
            transform: scale(0.88);
            transition: transform 0.06s;
        }
        #music-controls button svg {
            width: 18px; height: 18px;
            stroke: currentColor; fill: none;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }
        /* ── ACTION BUTTONS (bottom bar) ── */
        #action-buttons {
            position: fixed; bottom: calc(28px + env(safe-area-inset-bottom, 0px)); left: 50%; transform: translateX(-50%);
            display: none; gap: 18px; z-index: 50; pointer-events: all;
        }
        .action-wrap {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
        }
        .action-btn {
            background: none;
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 32px;
            padding: 0;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 120px; height: 120px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25), 0 0 10px rgba(255,255,255,0.15);
        }
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(0,0,0,0.35), 0 0 16px rgba(255,255,255,0.25);
        }
        .action-btn:active {
            transform: scale(0.93);
            transition: transform 0.08s;
        }
        .action-btn img { width: 100%; height: 100%; object-fit: cover; border-radius: 32px; }
        .btn-label {
            font-family: 'Quicksand', sans-serif;
            font-size: 14px; font-weight: 600;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.85);
        }

        /* ── FOOD MENU ── */
        #food-menu {
            position: fixed; bottom: calc(190px + env(safe-area-inset-bottom, 0px)); left: 50%; transform: translateX(-50%) scale(0.9);
            display: none; gap: 18px; z-index: 51; pointer-events: all;
            opacity: 0; transition: opacity 0.25s cubic-bezier(.34,1.56,.64,1), transform 0.25s cubic-bezier(.34,1.56,.64,1);
        }
        #food-menu.visible { display: flex; opacity: 1; transform: translateX(-50%) scale(1); }
        .food-item {
            border: none;
            border-radius: 10px;
            padding: 0;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            background: none;
        }
        .food-item:hover .food-box {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 8px 28px rgba(0,0,0,0.35), 0 0 16px rgba(255,255,255,0.25);
        }
        .food-item:active .food-box {
            transform: scale(0.93);
            transition: transform 0.08s;
        }
        .food-item .food-label {
            font-family: 'Quicksand', sans-serif;
            font-size: 13px; font-weight: 600;
            letter-spacing: 0.5px;
            color: rgba(255,255,255,0.9);
        }
        .food-box {
            width: 100px; height: 100px;
            border-radius: 30px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25), 0 0 10px rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.6);
        }
        .food-box img {
            width: 85%; height: 85%; object-fit: contain;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3));
        }
        .food-box.apple-bg { background: radial-gradient(circle at 40% 40%, #c4a8ff, #9b7ad8 50%, #5e3d8a); }
        .food-box.watermelon-bg { background: radial-gradient(circle at 40% 40%, #ffd78a, #d4a24c 50%, #8a6530); }
        .food-box.orange-bg { background: radial-gradient(circle at 40% 40%, #7ad8d8, #4ca8b0 50%, #2d6e78); }

        /* ── PLAY MENU ── */
        #play-menu {
            position: fixed; bottom: calc(190px + env(safe-area-inset-bottom, 0px)); left: 50%; transform: translateX(-50%) scale(0.9);
            display: none; gap: 14px; z-index: 51; pointer-events: all;
            opacity: 0; transition: opacity 0.25s cubic-bezier(.34,1.56,.64,1), transform 0.25s cubic-bezier(.34,1.56,.64,1);
            justify-content: center; align-items: center;
        }
        #play-menu.visible { display: flex; opacity: 1; transform: translateX(-50%) scale(1); }
        .game-item {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.6);
            color: rgba(255,255,255,0.85);
            border-radius: 30px;
            width: 100px; height: 100px;
            font-family: 'Quicksand', sans-serif;
            font-size: 13px; font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            display: flex; align-items: center; justify-content: center;
            text-align: center;
            padding: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25), 0 0 10px rgba(255,255,255,0.15);
        }
        .game-item:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.14);
            color: rgba(255,255,255,0.95);
            box-shadow: 0 8px 28px rgba(0,0,0,0.35), 0 0 16px rgba(255,255,255,0.25);
        }
        .game-item:active {
            transform: scale(0.93);
            transition: transform 0.08s;
        }

        @media (max-width: 600px) {
            #action-buttons { bottom: calc(14px + env(safe-area-inset-bottom, 0px)); gap: 10px; }
            .action-btn { width: 76px; height: 76px; border-radius: 22px; }
            .btn-label { font-size: 11px; }
            #food-menu { bottom: calc(130px + env(safe-area-inset-bottom, 0px)); gap: 10px; }
            .food-box { width: 70px; height: 70px; border-radius: 22px; }
            .food-item .food-label { font-size: 10px; }
            #play-menu { bottom: calc(130px + env(safe-area-inset-bottom, 0px)); gap: 8px; }
            .game-item { width: 70px; height: 70px; font-size: 11px; border-radius: 22px; }
        }
        @media (max-width: 380px) {
            #action-buttons { gap: 8px; }
            .action-btn { width: 66px; height: 66px; border-radius: 20px; }
            .btn-label { font-size: 10px; }
            #food-menu { bottom: calc(115px + env(safe-area-inset-bottom, 0px)); gap: 8px; }
            .food-box { width: 62px; height: 62px; border-radius: 18px; }
            #play-menu { bottom: calc(115px + env(safe-area-inset-bottom, 0px)); gap: 6px; }
            .game-item { width: 62px; height: 62px; font-size: 10px; border-radius: 18px; }
        }

        /* ── SLEEP OVERLAY ── */
        #sleep-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 45; pointer-events: none;
            background: radial-gradient(ellipse at 50% 60%, rgba(5,5,30,0.0) 0%, rgba(2,2,15,0.0) 100%);
            transition: background 2s ease;
            display: none;
        }
        #sleep-overlay.active {
            display: block;
            background: radial-gradient(ellipse at 50% 60%, rgba(5,5,30,0.32) 0%, rgba(2,2,15,0.48) 100%);
        }
        #sleep-zzz {
            position: fixed;
            top: 35%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 46; pointer-events: none;
            display: none;
            font-family: 'Quicksand', sans-serif;
        }
        #sleep-zzz.active { display: block; }

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        class CapybaraSimulator {
            constructor() {
                this._isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || navigator.maxTouchPoints > 1;
                this.renderer = new THREE.WebGLRenderer({
                    antialias: !this._isMobile,
                    powerPreference: 'high-performance',
                });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, this._isMobile ? 1.5 : 2));
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = this._isMobile ? THREE.BasicShadowMap : THREE.PCFShadowMap;
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.22;
                this.renderer.outputColorSpace = THREE.SRGBColorSpace;
                document.body.appendChild(this.renderer.domElement);

                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x131313);
                this.scene.fog = new THREE.FogExp2(0x131313, 0.022);

                // Camera: low angle revolving around capybara (matching reference)
                this.camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);

                // Orbit params: capybara is at origin, camera revolves around her
                this.orbitRadius = 5;
                this.orbitHeight = 1.3; // low angle like reference
                this.orbitSpeed = 0.08; // slow, cinematic
                this.orbitAngle = 0;
                this.orbitTarget = new THREE.Vector3(-1.15, 0.78, 0.1);

                // 3/4 view with the capybara staged to the open right side of the menu.
                this.camera.position.set(4.7, 1.9, 5.4);
                this.camera.lookAt(this.orbitTarget);

                this.controls = new OrbitControls(this.camera, this.renderer.domElement);
                this.controls.target.copy(this.orbitTarget);
                this.controls.maxPolarAngle = Math.PI / 2.05;
                this.controls.minPolarAngle = Math.PI / 4;
                this.controls.minDistance = 3;
                this.controls.maxDistance = 15;
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                this.controls.autoRotate = false;

                this.clock = new THREE.Clock();
                this.models = {};
                this.loadedCount = 0;
                this.totalModels = 0; // set dynamically in loadModels()
                this.capybara = null;
                this.mixer = null;

                // Hat system
                this.hatModels = [];
                this.currentHatIndex = -1; // -1 = no hat
                this.currentHatMesh = null;
                this._capyHeadBone = null;
                this._currentHatCfg = null;
                this._hatsEnabled = true;
                this._hatFollowPos = new THREE.Vector3();
                this._hatFollowQuat = new THREE.Quaternion();
                this._hatOffset = new THREE.Vector3();
                // Correction: bone local +Y = world +Z (forward), so rotate hat -90° around X
                // to map hat's local +Y (up) onto bone's local -Z (which = world +Y)
                this._hatCorrectionQuat = new THREE.Quaternion().setFromAxisAngle(
                    new THREE.Vector3(1, 0, 0), -Math.PI / 2
                );

                // SFX system (Web Audio, cozy sounds)
                this._sfxCtx = null;
                this._sfxGain = null;

                // Sleep system
                this._isSleeping = false;
                this._sleepFXt = 0; // 0 = awake, 1 = fully asleep (lerp factor)
                this._sleepFXTarget = 0;
                this._sleepFXSpeed = 0.6; // transition speed

                // Home menu scene state
                this._mainMenuActive = true;

                this.setupLighting();
                this.loadModels().then(() => this.buildScene());
                this.animate();

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            setupLighting() {
                this._hemi = new THREE.HemisphereLight(0x5a4436, 0x0d0d0d, 0.82);
                this.scene.add(this._hemi);

                this._sun = new THREE.DirectionalLight(0xffb77d, 2.05);
                this._sun.position.set(8, 10, 6);
                this._sun.castShadow = true;
                this._sun.shadow.mapSize.set(this._isMobile ? 512 : 1024, this._isMobile ? 512 : 1024);
                this._sun.shadow.camera.left = -20;
                this._sun.shadow.camera.right = 20;
                this._sun.shadow.camera.top = 20;
                this._sun.shadow.camera.bottom = -20;
                this._sun.shadow.camera.near = 0.5;
                this._sun.shadow.camera.far = 60;
                this._sun.shadow.bias = -0.001;
                this.scene.add(this._sun);

                this._ambient = new THREE.AmbientLight(0x2a241f, 0.92);
                this.scene.add(this._ambient);

                this._rim = new THREE.DirectionalLight(0x00e639, 0.42);
                this._rim.position.set(-6, 4, -4);
                this.scene.add(this._rim);

                this._sunnyBg = this.scene.background.clone();
                this._sunnyFog = this.scene.fog.color.clone();
                this._sunnyHemiSky = this._hemi.color.clone();
            }

            async loadModels() {
                const loader = new GLTFLoader();
                const bar = document.getElementById('loadBar');
                const text = document.getElementById('loadText');

                const modelFiles = {
                    'capybara': 'models/capybara-rigged.glb',
                };

                // ── ADD NEW HATS HERE ──────────────────────────────────────────
                const hatFiles = [
                    'models/hats/baseball.glb',
                    'models/hats/graduation.glb',
                    'models/hats/hardhat.glb',
                    'models/hats/pirate.glb',
                    'models/hats/tophat.glb',
                    'models/hats/wizard.glb',
                ];
                // ──────────────────────────────────────────────────────────────

                // Auto-compute total so loading bar stays accurate when hats are added
                this.totalModels = Object.keys(modelFiles).length + hatFiles.length;

                for (const [name, path] of Object.entries(modelFiles)) {
                    try {
                        text.textContent = `loading ${name}...`;
                        const gltf = await new Promise((resolve, reject) => {
                            loader.load(path, resolve, undefined, reject);
                        });
                        this.models[name] = gltf.scene;
                        // Store animations for capybara
                        if (name === 'capybara' && gltf.animations.length > 0) {
                            this.capyAnimations = gltf.animations;
                            console.log('Capybara animations:', gltf.animations.map(a => a.name));
                        }
                        this.loadedCount++;
                        bar.style.width = (this.loadedCount / this.totalModels * 100) + '%';
                    } catch (e) {
                        console.warn(`Failed to load ${name}:`, e);
                        this.loadedCount++;
                        bar.style.width = (this.loadedCount / this.totalModels * 100) + '%';
                    }
                }

                // Load hats
                for (const hatPath of hatFiles) {
                    try {
                        const hatName = hatPath.split('/').pop().replace('.glb', '');
                        text.textContent = `loading ${hatName}...`;
                        const gltf = await new Promise((resolve, reject) => {
                            loader.load(hatPath, resolve, undefined, reject);
                        });
                        const normalized = this.normalizeHatModel(gltf.scene);
                        this.hatModels.push(normalized);
                        this.loadedCount++;
                        bar.style.width = (this.loadedCount / this.totalModels * 100) + '%';
                    } catch (e) {
                        console.warn(`Failed to load hat ${hatPath}:`, e);
                        this.loadedCount++;
                        bar.style.width = (this.loadedCount / this.totalModels * 100) + '%';
                    }
                }

            }

            // Normalize a hat GLB to a consistent brim width and zero-based pivot.
            // Scales the model so its widest horizontal dimension = targetWidth (world meters),
            // centers it on XZ, and shifts it so its bottom sits at local y=0.
            // Wraps in a Group so the attachment point is always hat-bottom-center.
            // Drop any new hat GLB in models/hats/ and it will auto-fit.
            normalizeHatModel(hatScene, targetWidth = 0.6) {
                const box = new THREE.Box3().setFromObject(hatScene);
                const size = box.getSize(new THREE.Vector3());

                // Scale by max horizontal span (X or Z) — preserves hat proportions
                const maxHoriz = Math.max(size.x, size.z);
                if (maxHoriz > 0) hatScene.scale.setScalar(targetWidth / maxHoriz);

                // Recompute after scale: center XZ, push bottom to y = 0
                const box2 = new THREE.Box3().setFromObject(hatScene);
                const center2 = box2.getCenter(new THREE.Vector3());
                hatScene.position.x -= center2.x;
                hatScene.position.z -= center2.z;
                hatScene.position.y -= box2.min.y;

                // Wrap so external position/rotation acts on bottom-center of hat
                const wrapper = new THREE.Group();
                wrapper.add(hatScene);
                return wrapper;
            }

            buildScene() {
                // === CAPYBARA (rigged with animations) ===
                if (this.models['capybara']) {
                    const capy = this.models['capybara'];
                    const box = new THREE.Box3().setFromObject(capy);
                    const size = box.getSize(new THREE.Vector3());
                    const minY = box.min.y;
                    console.log('Capybara size:', size.x, size.y, size.z, 'minY:', minY);
                    // Rigged model is tiny (armature scale 0.01, 90deg X rotation)
                    // Scale up so capybara is ~1m tall
                    const targetHeight = 1.0;
                    const currentHeight = size.y || 0.001;
                    const scaleFactor = targetHeight / currentHeight;
                    
                    // Wrap in a group so we can rotate cleanly
                    const capyGroup = new THREE.Group();
                    capyGroup.add(capy);
                    capy.scale.set(scaleFactor, scaleFactor, scaleFactor);
                    
                    // Recalc after scale
                    const box2 = new THREE.Box3().setFromObject(capyGroup);
                    console.log('Capybara bbox min:', box2.min.x.toFixed(2), box2.min.y.toFixed(2), box2.min.z.toFixed(2),
                                'max:', box2.max.x.toFixed(2), box2.max.y.toFixed(2), box2.max.z.toFixed(2));
                    
                    capyGroup.position.set(0, -0.05, 0);
                    // Face toward camera (camera is at +z)
                    // The model faces +z in its local space after armature rotation
                    // so rotate 180 to face -z... test different values
                    capyGroup.rotation.y = 0;
                    
                    capy.traverse(c => {
                        if (c.isMesh) {
                            c.castShadow = true;
                            c.receiveShadow = true;
                            if (c.material) {
                                c.material = c.material.clone();
                                if (c.material.emissiveMap && !c.material.map) {
                                    c.material.map = c.material.emissiveMap;
                                }
                                c.material.emissive.setHex(0x2a1208);
                                c.material.emissiveIntensity = 0.34;
                                c.material.emissiveMap = null;
                                c.material.metalness = 0;
                                c.material.roughness = 0.8;
                                c.material.needsUpdate = true;
                            }
                        }
                    });

                    this.scene.add(capyGroup);
                    this.capybara = capyGroup;

                    // Find head bone for manual sway (lofi vibes)
                    this._capyHeadBone = null;
                    capy.traverse(c => {
                        if (c.name === 'head' && c.isBone) {
                            this._capyHeadBone = c;
                            this._headBaseRotY = c.rotation.y;
                            this._headBaseRotZ = c.rotation.z;
                            this._headBaseRotX = c.rotation.x;
                        }
                    });
                    // No mixer animation -- clip0 has root motion that fights positioning
                    // Head sway is done manually on the bone in animate()

                    // Setup hat cycling on tap
                    this.setupHatCycling();
                }

                // === LOFI MUSIC ===
                this.setupMusic();

                // Fade out loading screen gracefully
                const loadingEl = document.getElementById('loading');
                loadingEl.classList.add('fade-out');
                setTimeout(() => { loadingEl.style.display = 'none'; }, 700);
                this.setupPoints();
                this.setupMainMenu();
                console.log('Scene built!');
            }

            setupHatCycling() {
                // Per-hat placement offsets (world units). normalizeHatModel()
                // already set brim to 0.55m, so just tune up/fwd here.
                // up  = meters above bone pivot (world +Y)
                // fwd = meters forward (world +Z, capybara faces +Z)
                // Order must match hatFiles in loadModels()
                const hatConfigs = [
                    { up: 0.50, fwd: 0.0 },  // baseball
                    { up: 0.32, fwd: -0.06 },  // graduation
                    { up: 0.57, fwd: 0.0 },  // hardhat
                    { up: 0.28, fwd: 0.06 },  // pirate
                    { up: 0.54, fwd: -0.08 },  // tophat
                    { up: 0.58, fwd: -0.04 },  // wizard
                ];

                const onTap = () => {
                    // Cycle: -1 (none) -> 0 -> 1 -> ... -> N-1 -> -1 ...
                    this.currentHatIndex++;
                    if (this.currentHatIndex >= this.hatModels.length) {
                        this.currentHatIndex = -1;
                    }

                    // Remove current hat
                    if (this.currentHatMesh && this.currentHatMesh.parent) {
                        this.currentHatMesh.parent.remove(this.currentHatMesh);
                        this.currentHatMesh = null;
                        this._currentHatCfg = null;
                    }

                    // Add new hat
                    if (this.currentHatIndex >= 0 && this._capyHeadBone) {
                        const hat = this.hatModels[this.currentHatIndex].clone();

                        // Fix Poly Pizza materials (move emissive to diffuse like capybara)
                        hat.traverse(c => {
                            if (c.isMesh && c.material) {
                                if (c.material.emissiveMap && !c.material.map) {
                                    c.material.map = c.material.emissiveMap;
                                    c.material.emissive.setScalar(0);
                                    c.material.emissiveMap = null;
                                    c.material.needsUpdate = true;
                                }
                            }
                        });

                        // Per-hat tweaks
                        const cfg = hatConfigs[this.currentHatIndex] || { up: 0.50, fwd: 0.14 };

                        // Hat lives in scene root (scale=1, position/rotation set per-frame in animate).
                        hat.scale.set(1, 1, 1);

                        // Per-hat tweaks (after scale reset)
                        if (this.currentHatIndex === 0) { // baseball cap -> blue
                            hat.traverse(c => {
                                if (c.isMesh) {
                                    c.material = c.material.clone();
                                    c.material.color.setHex(0x1a3a8a);
                                    c.material.needsUpdate = true;
                                }
                            });
                        }
                        if (this.currentHatIndex === 1) { // graduation -> rotate so tassel hangs to side
                            hat.children[0].rotation.y = Math.PI / 2;
                            hat.children[0].rotation.z = -Math.PI / 12; // -15° tilt
                        }
                        if (this.currentHatIndex === 2) { // hardhat -> rotate -90° to face forward
                            hat.children[0].rotation.y = -Math.PI / 2;
                            hat.children[0].position.x += 0.04;
                        }
                        if (this.currentHatIndex === 4) { // tophat -> 25% bigger
                            hat.scale.set(1.25, 1.25, 1.25);
                            hat.children[0].rotation.x = -Math.PI / 18; // -10° X rotation
                        }
                        if (this.currentHatIndex === 5) { // wizard -> 25% bigger
                            hat.scale.set(1.25, 1.25, 1.25);
                            hat.children[0].rotation.x = -7 * Math.PI / 180; // -7° X
                        }
                        if (this.currentHatIndex === 3) { // pirate -> 40% bigger, nudge sideways
                            hat.scale.set(1.40, 1.40, 1.40);
                            hat.children[0].position.x += 0.04;
                        }

                        this._currentHatCfg = cfg;
                        this.scene.add(hat);
                        this.currentHatMesh = hat;
                    }
                };

                // Tap anywhere on canvas to cycle hats.
                // Use pointer events with drag detection to avoid OrbitControls
                // drag gestures being mistaken for taps.
                let _ptrDown = new THREE.Vector2();
                let _ptrMoved = false;
                this.renderer.domElement.addEventListener('pointerdown', e => {
                    _ptrDown.set(e.clientX, e.clientY);
                    _ptrMoved = false;
                });
                this.renderer.domElement.addEventListener('pointermove', e => {
                    if (Math.hypot(e.clientX - _ptrDown.x, e.clientY - _ptrDown.y) > 6) _ptrMoved = true;
                });
                this.renderer.domElement.addEventListener('pointerup', e => {
                    if (!_ptrMoved && this._hatsEnabled) onTap();
                });
            }

            setupMusic() {
                this.tracks = [
                    'audio/lofi_loop_01.mp3', 'audio/lofi_loop_02.mp3', 'audio/lofi_loop_03.mp3',
                    'audio/lofi_loop_04.mp3', 'audio/lofi_loop_05.mp3', 'audio/lofi_loop_06.mp3',
                    'audio/lofi_loop_07.mp3', 'audio/lofi_loop_08.mp3', 'audio/lofi_loop_09.mp3',
                    'audio/lofi_loop_10.mp3',
                ];
                this.currentTrack = Math.floor(Math.random() * this.tracks.length);
                this.audio = new Audio(this.tracks[this.currentTrack]);
                this.audio.volume = 0.3;

                this._gameAudioActive = false;

                // When track ends, play next in loop
                this._onTrackEnd = () => {
                    if (this._gameAudioActive) return;
                    this.currentTrack = (this.currentTrack + 1) % this.tracks.length;
                    const vol = this.audio.volume;
                    this.audio = new Audio(this.tracks[this.currentTrack]);
                    this.audio.volume = vol;
                    this.audio.addEventListener('ended', this._onTrackEnd);
                    this.audio.play().catch(() => {});
                };
                this.audio.addEventListener('ended', this._onTrackEnd);

                const startMusic = () => {
                    if (!this._gameAudioActive) this.audio.play().catch(() => {});
                    document.removeEventListener('click', startMusic);
                    document.removeEventListener('touchstart', startMusic);
                };
                document.addEventListener('click', startMusic);
                document.addEventListener('touchstart', startMusic);
                this.audio.play().catch(() => {});

                // Skip button
                document.getElementById('btn-skip').addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (this._gameAudioActive) return;
                    this.currentTrack = (this.currentTrack + 1) % this.tracks.length;
                    const wasPlaying = !this.audio.paused;
                    const vol = this.audio.volume;
                    this.audio.pause();
                    this.audio = new Audio(this.tracks[this.currentTrack]);
                    this.audio.volume = vol;
                    this.audio.addEventListener('ended', this._onTrackEnd);
                    if (wasPlaying) this.audio.play().catch(() => {});
                });

                // Mute toggle
                this._muted = false;
                this._savedVolume = this.audio.volume;
                document.getElementById('btn-mute').addEventListener('click', (e) => {
                    e.stopPropagation();
                    this._muted = !this._muted;
                    if (this._muted) {
                        this._savedVolume = this.audio.volume;
                        this.audio.volume = 0;
                        if (this._gameAudio) this._gameAudio.volume = 0;
                        if (this._sfxGain) this._sfxGain.gain.value = 0;
                    } else {
                        this.audio.volume = this._savedVolume;
                        if (this._gameAudio) this._gameAudio.volume = this._savedVolume;
                        if (this._sfxGain) this._sfxGain.gain.value = 0.35;
                    }
                    document.getElementById('btn-mute').innerHTML = this._muted
                        ? '<svg viewBox="0 0 24 24"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>'
                        : '<svg viewBox="0 0 24 24"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>';
                });
            }

            _startGameMusic(src) {
                // Flag to prevent lofi from restarting
                this._gameAudioActive = true;

                // Pause the main lofi rotation
                this._mainMusicWasPlaying = !this.audio.paused;
                this.audio.pause();
                this.audio.removeEventListener('ended', this._onTrackEnd);

                // Create and play the game-specific track on loop
                this._gameAudio = new Audio(src);
                this._gameAudio.loop = true;
                this._gameAudio.volume = this._muted ? 0 : (this._savedVolume || 0.3);
                this._gameAudio.play().catch(() => {});
            }

            _stopGameMusic() {
                this._gameAudioActive = false;

                if (this._gameAudio) {
                    this._gameAudio.pause();
                    this._gameAudio = null;
                }

                // Resume the main lofi rotation
                this.audio.addEventListener('ended', this._onTrackEnd);
                if (this._mainMusicWasPlaying) {
                    this.audio.play().catch(() => {});
                }
            }

            async setupPoints() {
                this.score = 0;
                this.scoreEl = document.getElementById('score');

                // 1 point every 10 seconds
                setInterval(() => {
                    this.score++;
                    this.scoreEl.textContent = this.score;
                }, 10000);
            }

            /* ── SFX System (cozy procedural sounds via Web Audio) ── */
            setupMainMenu() {
                const menu = document.getElementById('main-menu');
                const playBtn = document.getElementById('menu-play');
                const settingsBtn = document.getElementById('menu-settings');
                const exitBtn = document.getElementById('menu-exit');
                const settingsPanel = document.getElementById('settings-panel');
                const musicSetting = document.getElementById('setting-music');
                const exitNote = document.getElementById('exit-note');

                const syncSettings = () => {
                    musicSetting.classList.toggle('active', !this._muted);
                };

                playBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this._playSfxClick();
                    this._mainMenuActive = false;
                    menu.classList.remove('visible');
                    settingsPanel.classList.remove('visible');
                    exitNote.classList.remove('visible');
                    document.getElementById('hud').style.display = 'flex';
                    document.getElementById('action-buttons').style.display = 'none';
                    document.getElementById('freemode-bar').style.display = 'none';
                });

                settingsBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this._playSfxMenuOpen();
                    settingsPanel.classList.toggle('visible');
                    exitNote.classList.remove('visible');
                    syncSettings();
                });

                musicSetting.addEventListener('click', (e) => {
                    e.stopPropagation();
                    document.getElementById('btn-mute').click();
                    syncSettings();
                });

                exitBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this._playSfxClick();
                    exitNote.classList.add('visible');
                    settingsPanel.classList.remove('visible');
                    window.close();
                });

                document.getElementById('hud').style.display = 'none';
                document.getElementById('action-buttons').style.display = 'none';
                document.getElementById('freemode-bar').style.display = 'none';
                syncSettings();
                menu.classList.add('visible');
            }

            _ensureSFX() {
                if (this._sfxCtx) return;
                this._sfxCtx = new (window.AudioContext || window.webkitAudioContext)();
                this._sfxGain = this._sfxCtx.createGain();
                this._sfxGain.gain.value = this._muted ? 0 : 0.35;
                this._sfxGain.connect(this._sfxCtx.destination);
            }

            _resumeSFX() {
                if (this._sfxCtx && this._sfxCtx.state === 'suspended') this._sfxCtx.resume();
            }

            // Soft pop when food lands - gentle, cozy
            _playSfxFoodLand() {
                this._ensureSFX(); this._resumeSFX();
                const ctx = this._sfxCtx;
                const t = ctx.currentTime;
                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(320, t);
                osc.frequency.exponentialRampToValueAtTime(180, t + 0.12);
                g.gain.setValueAtTime(0.25, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
                osc.connect(g).connect(this._sfxGain);
                osc.start(t); osc.stop(t + 0.2);
            }

            // Soft munch/chomp when capybara eats - two short blips
            _playSfxMunch() {
                this._ensureSFX(); this._resumeSFX();
                const ctx = this._sfxCtx;
                const t = ctx.currentTime;
                for (let i = 0; i < 2; i++) {
                    const osc = ctx.createOscillator();
                    const g = ctx.createGain();
                    osc.type = 'sine';
                    const start = t + i * 0.08;
                    osc.frequency.setValueAtTime(280 + i * 40, start);
                    osc.frequency.exponentialRampToValueAtTime(150, start + 0.06);
                    g.gain.setValueAtTime(0.2, start);
                    g.gain.exponentialRampToValueAtTime(0.001, start + 0.08);
                    osc.connect(g).connect(this._sfxGain);
                    osc.start(start); osc.stop(start + 0.1);
                }
            }

            // Happy ascending chime when hearts spawn - warm pentatonic
            _playSfxHeartChime() {
                this._ensureSFX(); this._resumeSFX();
                const ctx = this._sfxCtx;
                const t = ctx.currentTime;
                const notes = [523.25, 587.33, 659.25, 783.99]; // C5 D5 E5 G5
                notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const g = ctx.createGain();
                    osc.type = 'sine';
                    const start = t + i * 0.07;
                    osc.frequency.value = freq;
                    g.gain.setValueAtTime(0, start);
                    g.gain.linearRampToValueAtTime(0.15, start + 0.02);
                    g.gain.exponentialRampToValueAtTime(0.001, start + 0.35);
                    osc.connect(g).connect(this._sfxGain);
                    osc.start(start); osc.stop(start + 0.4);
                });
            }

            // Soft click for UI interactions
            _playSfxClick() {
                this._ensureSFX(); this._resumeSFX();
                const ctx = this._sfxCtx;
                const t = ctx.currentTime;
                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, t);
                osc.frequency.exponentialRampToValueAtTime(600, t + 0.03);
                g.gain.setValueAtTime(0.1, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
                osc.connect(g).connect(this._sfxGain);
                osc.start(t); osc.stop(t + 0.06);
            }

            // Gentle whoosh for menu open
            _playSfxMenuOpen() {
                this._ensureSFX(); this._resumeSFX();
                const ctx = this._sfxCtx;
                const t = ctx.currentTime;
                const bufSize = Math.floor(ctx.sampleRate * 0.1);
                const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
                const src = ctx.createBufferSource();
                src.buffer = buf;
                const filt = ctx.createBiquadFilter();
                filt.type = 'bandpass'; filt.frequency.value = 2000; filt.Q.value = 0.5;
                const g = ctx.createGain();
                g.gain.setValueAtTime(0.06, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
                src.connect(filt).connect(g).connect(this._sfxGain);
                src.start(t);
            }

            // Soft sleep onset tone
            _playSfxSleep() {
                this._ensureSFX(); this._resumeSFX();
                const ctx = this._sfxCtx;
                const t = ctx.currentTime;
                const notes = [392, 330, 262]; // G4, E4, C4 - descending
                notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const g = ctx.createGain();
                    osc.type = 'sine';
                    const start = t + i * 0.15;
                    osc.frequency.value = freq;
                    g.gain.setValueAtTime(0, start);
                    g.gain.linearRampToValueAtTime(0.12, start + 0.04);
                    g.gain.exponentialRampToValueAtTime(0.001, start + 0.4);
                    osc.connect(g).connect(this._sfxGain);
                    osc.start(start); osc.stop(start + 0.45);
                });
            }

            // Wake up bright ascending tone
            _playSfxWake() {
                this._ensureSFX(); this._resumeSFX();
                const ctx = this._sfxCtx;
                const t = ctx.currentTime;
                const notes = [262, 330, 392]; // C4, E4, G4 - ascending
                notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const g = ctx.createGain();
                    osc.type = 'sine';
                    const start = t + i * 0.1;
                    osc.frequency.value = freq;
                    g.gain.setValueAtTime(0, start);
                    g.gain.linearRampToValueAtTime(0.12, start + 0.03);
                    g.gain.exponentialRampToValueAtTime(0.001, start + 0.3);
                    osc.connect(g).connect(this._sfxGain);
                    osc.start(start); osc.stop(start + 0.35);
                });
            }

            /* ── Sparkle particles (burst on food consumption) ── */
            /* ── Sleep system ── */
            _toggleSleep() {
                if (this._isSleeping) this._wakeUp();
                else this._startSleep();
            }

            _showSleepBlockedPopup() {
                const popup = document.getElementById('sleep-blocked-popup');
                popup.classList.add('show');
                clearTimeout(this._sleepPopupTimer);
                this._sleepPopupTimer = setTimeout(() => popup.classList.remove('show'), 1800);
            }

            _startSleep() {
                this._isSleeping = true;
                this._sleepFXTarget = 1;
                this._playSfxSleep();
                document.getElementById('btn-sleep').classList.add('active');
                document.getElementById('sleep-overlay').classList.add('active');
                document.getElementById('sleep-zzz').classList.add('active');
                // Tilt the capybara to lay down
                if (this.capybara) {
                    this._capySleepTween = { startRot: this.capybara.rotation.x, targetRot: -0.45, t: 0 };
                }
            }

            _wakeUp() {
                this._isSleeping = false;
                this._sleepFXTarget = 0;
                this._playSfxWake();
                document.getElementById('btn-sleep').classList.remove('active');
                document.getElementById('sleep-overlay').classList.remove('active');
                document.getElementById('sleep-zzz').classList.remove('active');
                // Tilt back upright
                if (this.capybara) {
                    this._capySleepTween = { startRot: this.capybara.rotation.x, targetRot: 0, t: 0 };
                }
            }

            _updateSleepFX(delta) {
                if (this._sleepFXt === this._sleepFXTarget && this._sleepFXt === 0) return;
                if (this._sleepFXt < this._sleepFXTarget)
                    this._sleepFXt = Math.min(this._sleepFXt + this._sleepFXSpeed * delta, 1);
                else
                    this._sleepFXt = Math.max(this._sleepFXt - this._sleepFXSpeed * delta, 0);
                const t = this._sleepFXt;

                // Darken lighting — gentler than stand FX, like nighttime
                this._sun.intensity = THREE.MathUtils.lerp(1.2, 0.08, t);
                this._hemi.intensity = THREE.MathUtils.lerp(1.0, 0.12, t);
                this._hemi.color.lerpColors(this._sunnyHemiSky, new THREE.Color(0x0a0a20), t);
                this._ambient.intensity = THREE.MathUtils.lerp(0.4, 0.08, t);
                this.scene.background.lerpColors(this._sunnyBg, new THREE.Color(0x050520), t);
                if (this._skyMat) {
                    this._skyMat.uniforms.topColor.value.lerpColors(this._sunnySkyTop, new THREE.Color(0x050520), t);
                    this._skyMat.uniforms.bottomColor.value.lerpColors(this._sunnySkyBot, new THREE.Color(0x0a0a30), t);
                }
                this.scene.fog.color.lerpColors(this._sunnyFog, new THREE.Color(0x080818), t);
                this.scene.fog.density = THREE.MathUtils.lerp(0.014, 0.025, t);

                // Capybara lay-down tween
                if (this._capySleepTween && this.capybara) {
                    this._capySleepTween.t = Math.min(this._capySleepTween.t + delta * 1.5, 1);
                    const ease = this._capySleepTween.t * (2 - this._capySleepTween.t); // ease-out
                    this.capybara.rotation.x = THREE.MathUtils.lerp(
                        this._capySleepTween.startRot,
                        this._capySleepTween.targetRot,
                        ease
                    );
                    if (this._capySleepTween.t >= 1) this._capySleepTween = null;
                }
            }

            animate() {
                requestAnimationFrame(() => this.animate());

                const delta = this.clock.getDelta();
                const time = this.clock.elapsedTime;

                // Head sway - slow, like she's vibing to the music.
                // When sleeping, slow the sway to near-still breathing rhythm
                if (this._capyHeadBone) {
                    const swayScale = this._isSleeping ? 0.15 : 1.0;
                    const swaySpeed = this._isSleeping ? 0.3 : 1.0;
                    this._capyHeadBone.rotation.y = this._headBaseRotY + Math.sin(time * 0.8 * swaySpeed) * 0.12 * swayScale;
                    this._capyHeadBone.rotation.z = this._headBaseRotZ + Math.sin(time * 0.55 * swaySpeed + 0.7) * 0.06 * swayScale;
                    this._capyHeadBone.rotation.x = this._headBaseRotX + Math.sin(time * 0.5 * swaySpeed + 1.2) * 0.04 * swayScale;
                }

                // Hat follows head bone as a prop (offset rotates with bone)
                if (this.currentHatMesh && this._capyHeadBone && this._currentHatCfg) {
                    this._capyHeadBone.getWorldPosition(this._hatFollowPos);
                    this._capyHeadBone.getWorldQuaternion(this._hatFollowQuat);
                    const cfg = this._currentHatCfg;
                    // Offset in bone-local space: +Y = fwd, -Z = up
                    this._hatOffset.set(0, cfg.fwd, -cfg.up);
                    this._hatOffset.applyQuaternion(this._hatFollowQuat);
                    this.currentHatMesh.position.copy(this._hatFollowPos).add(this._hatOffset);
                    // Orientation: bone quat + correction (-90° X) so hat stays upright
                    this.currentHatMesh.quaternion.copy(this._hatFollowQuat)
                        .multiply(this._hatCorrectionQuat);
                }

                if (this._sleepFXt > 0 || this._sleepFXTarget > 0) this._updateSleepFX(delta);

                this.controls.update();
                this.renderer.render(this.scene, this.camera);
            }
        }

        const startGame = () => {
            if (!window.game) window.game = new CapybaraSimulator();
        };
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', startGame, { once: true });
        } else {
            startGame();
        }
    </script>
